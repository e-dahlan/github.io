        }

           2. Background Adjustments
           ========================================= */
        .lm-animated-bg {

            background-color: transparent !important; 
        }

        /* =========================================
           3. Typography & Titles
           ========================================= */
        h2, h3, h4, label {

        .block-title h2, .block-title h3 {

        }
        
        .lm-info-block.gray-default {
            background-color: #2a2a2a !important; /* Darker card background */
            border: 1px solid #333333;
        }
        .lm-info-block.gray-default h4,

            color: #666666 !important;
        }
        .form-control:focus {
            border-color: #555555 !important;
            box-shadow: 0 0 5px rgba(255,255,255,0.1) !important;
            outline: none;
        }

        .btn-send {
            background-color: #d3d3d3 !important;
            color: #222222 !important;
            border: none !important;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .btn-send:hover {
            background-color: #b0b0b0 !important;

        }

        /* Header spacing on mobile */

        }
        @media only screen and (max-width: 991px) {

    <!-- Script for mobile menu toggle and auto-updating copyright year -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Auto-update Copyright Year
            const yearEl = document.getElementById('current-year');
            if (yearEl) {
                yearEl.textContent = new Date().getFullYear();
            }

            // 2. Mobile Menu Toggle
            const menuToggle = document.querySelector('.menu-toggle');
            const siteNav = document.querySelector('.site-nav');

            if (menuToggle && siteNav) {
                menuToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (siteNav.classList.contains('mobile-menu-hide')) {
                        siteNav.classList.remove('mobile-menu-hide');
                    } else {
                        siteNav.classList.add('mobile-menu-hide');
                    }
                });
            }
        });
    </script>
