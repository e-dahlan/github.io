<!DOCTYPE html>
<html lang="en" class="js no-touch cssanimations csstransforms csstransforms3d csstransitions">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <title>Edrees Dahlan - About Me</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Edrees Dahlan - Professional Profile of an Ecommerce Supervisor and Computer Engineer.">
    <meta name="author" content="Edrees Dahlan">
    
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./assets/normalize.css" type="text/css">
    <link rel="stylesheet" href="./assets/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="./assets/owl.carousel.css" type="text/css">
    <link rel="stylesheet" href="./assets/magnific-popup.css" type="text/css">
    <link rel="stylesheet" href="./assets/main.css" type="text/css">
    
    <script src="./assets/modernizr.custom.js.download"></script>

    <style>
        /* إصلاح جذري للخلفية ومنع الانزلاق الجانبي */
        html, body {
            background-color: #d3d3d3 !important;
            background-image: none !important;
            overflow-x: hidden;
            width: 100%;
        }
        .page, .page-container, .lm-animated-bg, .site-main, .single-page-content {
            background-color: #d3d3d3 !important;
            background-image: none !important;
        }

        /* تحسين تباين النصوص */
        h1, h2, h3, h4, h5, p, .modern-fact h4, .modern-fact .fun-fact-value { color: #222222 !important; }

        /* القائمة الجانبية للجوال */
        @media (max-width: 991px) {
            .site-nav { background-color: #d3d3d3 !important; border-top: 1px solid #b0b0b0; }
            .site-nav.mobile-menu-hide { display: none !important; }
            .site-nav.show-mobile-menu { display: block !important; position: absolute; top: 60px; left: 0; width: 100%; z-index: 999; padding: 20px; }
        }

        .home-photo { perspective: 1000px; }
        .hp-inner { transition: transform 0.3s ease-out, box-shadow 0.3s ease-out; transform-style: preserve-3d; }
        .home-photo:hover .hp-inner { transform: rotateX(8deg) rotateY(-10deg) scale(1.04); box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5); }

        .btn-primary { background-color: #222222 !important; border-color: #222222 !important; color: #ffffff !important; }
        
        .header .logo-symbol { background-color: transparent !important; border: none !important; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .header .logo-symbol img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .menu-toggle { font-size: 2rem; color: #222222; cursor: pointer; }
    </style>
</head>

<body class="page">
    <div class="lm-animated-bg"></div>
    <div class="page-scroll">
        <div id="page_container" class="page-container">
            <header id="site_header" class="header">
                <div class="header-content clearfix">
                    <div class="text-logo">
                        <a href="index.html">
                            <div class="logo-symbol"><img src="./favicon.png" alt="Logo"></div>
                            <div class="logo-text">Edrees <span>Dahlan</span></div>
                        </a>
                    </div>
                    <div class="site-nav mobile-menu-hide">
                        <ul class="leven-classic-menu site-main-menu">
                            <li class="menu-item current-menu-item"><a href="index.html">About Me</a></li>
                            <li class="menu-item"><a href="resume.html">Resume</a></li>
                            <li class="menu-item"><a href="contact.html">Contact</a></li>
                        </ul>
                    </div>
                    <a class="menu-toggle mobile-visible">&#9776;</a>
                </div>
            </header>

            <div id="main" class="site-main">
                <div id="main-content" class="single-page-content">
                    <div id="content" class="page-content">
                        <div class="row">
                            <div class="col-xs-12">
                                <div class="home-content">
                                    <div class="row flex-v-align">
                                        <div class="col-sm-5"><div class="home-photo"><div class="hp-inner" style="background-image: url('./img/main_photo.jpg');"></div></div></div>
                                        <div class="col-sm-7">
                                            <div class="home-text">
                                                <h4>Computer Engineer | Ecommerce Supervisor</h4>
                                                <h1>EDREES DAHLAN</h1>
                                                <p>Highly analytical Ecommerce Supervisor managing Magento content and operational workflows.</p>
                                                <div class="home-buttons">
                                                    <a href="Edrees_Dahlan_Resume.pdf" class="btn btn-primary" download>Download CV (PDF)</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/jquery-2.1.3.min.js.download"></script>
    <script src="./assets/main.js.download"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // حل نهائي للقائمة الجانبية
            const toggle = document.querySelector('.menu-toggle');
            const nav = document.querySelector('.site-nav');
            toggle.addEventListener('click', () => {
                nav.classList.toggle('mobile-menu-hide');
                nav.classList.toggle('show-mobile-menu');
            });
        });
    </script>
</body>
</html>
